name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check sample contract
        run: |
          pytest -v tests/test_features_sample_contract.py

      - name: Prepare sample features
        run: |
          mkdir -p artifacts/features
          cp tests/fixtures/features_sample.parquet artifacts/features/features.parquet

      - name: Create minimal drivers file
        run: |
          python - <<'PY'
          from pathlib import Path
          import pandas as pd

          df = pd.read_parquet("tests/fixtures/features_sample.parquet")
          driver_ids = sorted(df["driverId"].astype(int).unique())

          out = Path("data/raw")
          out.mkdir(parents=True, exist_ok=True)

          pd.DataFrame({
              "driverId": driver_ids,
              "forename": [f"Driver{i}" for i in driver_ids],
              "surname": [f"Test{i}" for i in driver_ids],
          }).to_csv(out / "drivers.csv", index=False)
          PY

      - name: Train
        run: |
          python -m src.cli train

      - name: Predict
        run: |
          python -m src.cli predict